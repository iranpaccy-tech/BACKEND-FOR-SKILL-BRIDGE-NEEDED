<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillBridge - Sign In</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* login page custom layout */
        body.login-page {
            display: flex;
            min-height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .login-image {
            flex: 1;
            background: url('asset/HBoLdmbXwAAwNNn.svg') center/cover no-repeat;
            position: relative;
        }
        .login-form-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            padding: 2rem;
        }
        .login-form {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
        }
        .login-form h2 {
            margin-bottom: 1.5rem;
            font-size: 1.75rem;
            color: var(--text-primary);
            text-align: center;
        }
        .login-form .form-group {
            margin-bottom: 1.25rem;
        }
        .login-form label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .login-form input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 1rem;
            border: 1px solid var(--input-border);
            border-radius: var(--radius-sm);
            background: #e3f2fd; /* light blue as in screenshot */
            font-size: 1rem;
            position: relative;
        }
        .login-form .password-wrapper {
            position: relative;
        }
        .login-form .password-wrapper i.eye-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--gray-600);
        }
        .login-form .btn-login {
            width: 100%;
            padding: 0.75rem;
            background: #00BFA5; /* teal button color from screenshot */
            border: none;
            border-radius: var(--radius-md);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-form .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(139,92,246,0.3);
        }
        .login-form .extra-link {
            display: block;
            margin-top: 1rem;
            text-align: center;
            color: #009688;
            text-decoration: none;
        }
        header.login-header {
            position: absolute;
            top: 20px;
            left: 30px;
        }
        header.login-header .logo-img {
            height: 50px;
        }
        @media (max-width: 1024px) {
            body.login-page {
                flex-direction: column-reverse;
            }
            .login-image {
                height: 35vh;
                min-height: 250px;
            }
            .login-form-container {
                padding: 1.5rem;
            }
            .login-form {
                padding: 2rem;
                max-width: 100%;
            }
        }
        
        @media (max-width: 768px) {
            body.login-page {
                flex-direction: column;
            }
            .login-image {
                height: 30vh;
                min-height: 200px;
            }
            .login-form-container {
                padding: 1rem;
            }
            .login-form {
                padding: 1.5rem;
                max-width: 100%;
            }
            .login-form h2 {
                font-size: 1.5rem;
                margin-bottom: 1.25rem;
            }
            header.login-header {
                top: 15px;
                left: 15px;
            }
            header.login-header .logo-img {
                height: 40px;
            }
        }
        
        @media (max-width: 480px) {
            body.login-page {
                overflow-y: auto;
            }
            .login-image {
                height: 25vh;
                min-height: 180px;
            }
            .login-form-container {
                padding: 1rem;
                min-height: auto;
            }
            .login-form {
                padding: 1.25rem;
            }
            .login-form h2 {
                font-size: 1.3rem;
            }
            .login-form .form-group {
                margin-bottom: 1rem;
            }
            .login-form .btn-login {
                padding: 0.65rem;
                font-size: 0.95rem;
            }
            .aux-icons {
                bottom: 10px;
                right: 10px;
            }
            .aux-btn {
                width: 45px;
                height: 45px;
                font-size: 1rem;
            }
        }
        .aux-icons {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }
        .aux-btn {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            text-decoration: none;
        }
        .aux-btn.red { background: #C2185B; }
        .aux-btn.teal { background: #009688; }
        .aux-btn:hover { opacity: 0.85; }

    </style>
</head>
<body class="login-page">
<!-- include shared scripts for authentication -->
<script src="js/utils.js"></script>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script><script>
    function togglePasswordVisibility() {
        const pwd = document.getElementById('loginPassword');
        const icon = document.querySelector('.eye-toggle');
        if (pwd.type === 'password') {
            pwd.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            pwd.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
</script>    <div class="login-image">
        <header class="login-header">
            <a href="/"><img src="asset/Black_Simple_SB_Latter_Logo-removebg-preview.png" alt="SkillBridge" class="logo-img"></a>
        </header>
    </div>
    <div class="login-form-container">
        <form id="loginForm" class="login-form" onsubmit="return false;">
            <h2>Welcome Back to SkillBridge Academy</h2>
            <div class="form-group">
                <label for="loginEmail">Email or Student ID</label>
                <input type="email" id="loginEmail" placeholder="Enter your email" required>
            </div>
            <div class="form-group password-wrapper">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password" required>
                <i class="fas fa-eye eye-toggle" onclick="togglePasswordVisibility()"></i>
            </div>
            <button type="submit" class="btn-login">Sign In</button>
            <a href="#" class="extra-link">Forgot password?</a>
        </form>
    </div>
    <div class="aux-icons">
        <a href="#" class="aux-btn red"><i class="fas fa-question"></i></a>
        <a href="#" class="aux-btn red"><i class="fas fa-comments"></i></a>
        <a href="#" class="aux-btn teal"><i class="fas fa-universal-access"></i></a>
    </div>
</body>
</html>
