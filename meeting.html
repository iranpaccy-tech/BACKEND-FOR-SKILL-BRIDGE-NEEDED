<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meeting Page</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Arial;
    display:flex;
    height:100vh;
    overflow:hidden;
}

/* SIDEBAR */
.sidebar{
    width:280px;
    background:linear-gradient(135deg,#00897B 0%,#008B82 100%);
    color:white;
    padding:2rem 0;
    position: fixed;
    height: 100vh;
    overflow-y: auto;
    transition:0.3s;
}
.sidebar.collapsed{
    width:0;
    padding:0;
    overflow:hidden;
}

.sidebar-logo{
    padding:0 1.5rem 2rem;
    display:flex;
    align-items:center;
    gap:0.75rem;
    font-size:1.2rem;
    font-weight:700;
}

.sidebar-logo img{
    height:40px;
}

.sidebar-nav{
    list-style:none;
}

.sidebar-nav li{
    margin:0.5rem 0;
}

.sidebar-nav a{
    display:flex;
    align-items:center;
    gap:1rem;
    padding:0.75rem 1.5rem;
    color:rgba(255,255,255,0.8);
    text-decoration:none;
    transition:all 0.3s;
    font-weight:500;
}

.sidebar-nav a:hover{
    color:white;
    background:rgba(255,255,255,0.1);
    padding-left:2rem;
}

.sidebar-nav a.active{
    color:white;
    background:rgba(255,255,255,0.2);
    border-left:4px solid white;
    padding-left:1.25rem;
}

.sidebar-nav i{
    width:24px;
    text-align:center;
}

/* MAIN */
.main-content{
    margin-left: 280px;
    flex:1;
    display:flex;
    flex-direction:column;
    transition:0.3s;
}
.main-content.collapsed{margin-left:0;}

/* HEADER */
.meeting-header{
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:white;
    align-items:center;
}

.header-left{
    display:flex;
    align-items:center;
    gap:10px;
}

.toggle-btn{
    background:none;
    border:none;
    font-size:18px;
    cursor:pointer;
}

/* VIDEO */
.video-area{
    flex:1;
    background:black;
}

.video-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    height:100%;
    padding:10px;
}

.video-tile{
    background:#222;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    position:relative;
}

.video-label{
    position:absolute;
    bottom:5px;
    left:5px;
    background:rgba(0,0,0,0.5);
    padding:4px 6px;
    border-radius:5px;
    font-size:12px;
}

/* CONTROLS */
.control-bar{
    height:60px;
    background:#333;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
}

.control-btn{
    background:none;
    border:none;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.red{color:red;}
.control-bar{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#1f1f1f;
    padding:12px 20px;
    border-radius:50px;
    display:flex;
    gap:15px;
    align-items:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.control-btn{
    width:50px;
    height:50px;
    border-radius:8px;
    border:none;
    background:#2b2b2b;
    display: flex;
    align-items: center;
    justify-content: center;
    color:white;
    font-size:1.2rem;
    cursor:pointer;
    transition: all 0.3s;
}

.control-btn:hover{
    opacity: 0.85;
    transform: scale(1.05);
}

.control-btn.active{
    background:#00897B;
}

.control-btn.red{
    background:#C2185B;
}
</style>
</head>

<body>

<!-- ✅ YOUR SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <a href="index.html"><img src="asset/Black_Simple_SB_Latter_Logo-removebg-preview.png" alt="SkillBridge"></a>
        </div>

        <nav class="sidebar-nav">
            <li><a href="dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a></li>
            <li><a href="explore-courses.html"><i class="fas fa-book"></i> Explore Courses</a></li>
            <li><a href="class-sessions.html"><i class="fas fa-calendar-check"></i> Class Sessions</a></li>
            <li><a href="submissions.html"><i class="fas fa-file-check"></i> Submissions</a></li>
            <li><a href="groups.html"><i class="fas fa-users"></i> Groups</a></li>
            <li><a href="community.html" class="active"><i class="fas fa-comments"></i> Community</a></li>
            <li><a href="power-ai.html"><i class="fas fa-bolt"></i> Power AI</a></li>
            <li><a href="certificates.html"><i class="fas fa-certificate"></i> Certificates</a></li>
            <li><a href="#" id="collapseLink" style="margin-top: 2rem; color: rgba(255,255,255,0.6);"><i class="fas fa-chevron-left"></i>
                    Collapse</a></li>
        </nav>
    </aside>

<!-- MAIN -->
<div class="main-content">

    <div class="meeting-header">
        <div class="header-left">

            <!-- 🔥 MEETING BUTTON -->
            <button id="meetingCollapseBtn" class="toggle-btn" style="display:none;">
                <i class="fas fa-chevron-left"></i>
            </button>

            <h2>Group Meeting</h2>
        </div>

        <div><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
  <path d="M12 12c2.76 0 5-2.24 5-5S14.76 2 12 2 7 4.24 7 7s2.24 5 5 5z"/>
  <path d="M12 14c-4.42 0-8 2.24-8 5v3h16v-3c0-2.76-3.58-5-8-5z"/>
</svg> PACCY</div>
    </div>

    <div class="video-area">
        <div class="video-grid" id="grid"></div>
    </div>

</div>

<!-- FLOATING CONTROL BAR -->
<div class="control-bar" id="controlBar">

    <button class="control-btn" id="micBtn" onclick="toggleMic(this)">
        <i class="fas fa-microphone"></i>
    </button>

    <button class="control-btn" id="camBtn" onclick="toggleCam(this)">
        <i class="fas fa-video"></i>
    </button>

    <button class="control-btn" onclick="toggleEmojiPanel()">
        <i class="fas fa-smile"></i>
    </button>

    <button class="control-btn red" onclick="endCall()">
        <i class="fas fa-phone-slash"></i>
    </button>

</div>

<!-- EMOJI PANEL -->
<div id="emojiPanel" style="
    position:fixed;
    bottom:90px;
    left:50%;
    transform:translateX(-50%);
    background:#222;
    padding:10px 15px;
    border-radius:30px;
    display:none;
    gap:10px;
">
    <span onclick="sendEmoji('👍')">👍</span>
    <span onclick="sendEmoji('😂')">😂</span>
    <span onclick="sendEmoji('🔥')">🔥</span>
    <span onclick="sendEmoji('❤️')">❤️</span>
</div>

<!-- CALL ENDED OVERLAY -->
<div id="callEnded" style="
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:black;
    color:white;
    font-size:24px;
    justify-content:center;
    align-items:center;
">
    Call Ended
</div>

<script>
let micOn = true;
let camOn = true;
let localStream = null;

// ================= CAMERA START =================
async function startCamera() {
    const videoTile = document.querySelector(".video-tile");

    try {
        localStream = await navigator.mediaDevices.getUserMedia({
            video: true,
            audio: true
        });

        // replace Nina Duffy (You) box with real camera
        videoTile.innerHTML = "";

        const video = document.createElement("video");
        video.srcObject = localStream;
        video.autoplay = true;
        video.playsInline = true;
        video.muted = true;

        video.style.width = "100%";
        video.style.height = "100%";
        video.style.objectFit = "cover";
        video.style.borderRadius = "10px";

        const label = document.createElement("div");
        label.className = "video-label";
        label.innerText = "Nina Duffy (You)";

        videoTile.appendChild(video);
        videoTile.appendChild(label);

    } catch (err) {
        alert("Camera access denied or not supported");
        console.error(err);
    }
}

// ================= MIC TOGGLE =================
function toggleMic(btn){
    micOn = !micOn;

    if (localStream) {
        localStream.getAudioTracks().forEach(track => {
            track.enabled = micOn;
        });
    }

    btn.classList.toggle("active");

    btn.innerHTML = micOn
        ? '<i class="fas fa-microphone"></i>'
        : '<i class="fas fa-microphone-slash"></i>';
}

// ================= CAMERA TOGGLE =================
function toggleCam(btn){
    camOn = !camOn;

    if (localStream) {
        localStream.getVideoTracks().forEach(track => {
            track.enabled = camOn;
        });
    }

    btn.classList.toggle("active");

    btn.innerHTML = camOn
        ? '<i class="fas fa-video"></i>'
        : '<i class="fas fa-video-slash"></i>';
}

// ================= EMOJI =================
function toggleEmojiPanel(){
    const panel = document.getElementById("emojiPanel");
    panel.style.display = panel.style.display === "flex" ? "none" : "flex";
}

function sendEmoji(emoji){
    const grid = document.getElementById("grid");

    const el = document.createElement("div");
    el.style.position = "absolute";
    el.style.top = "20px";
    el.style.right = "20px";
    el.style.fontSize = "30px";
    el.innerText = emoji;

    grid.appendChild(el);

    setTimeout(() => el.remove(), 2000);

    document.getElementById("emojiPanel").style.display = "none";
}

// ================= END CALL =================
function endCall(){
    if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
    }

    document.getElementById("controlBar").style.display = "none";
    document.getElementById("emojiPanel").style.display = "none";
    document.getElementById("callEnded").style.display = "flex";

    document.getElementById("grid").style.opacity = "0.2";
}

// ================= USERS GRID =================
const users = [
    "Nina Duffy","Owen Johnson","Tarek Ayad",
    "Mia Smith","Lauren Williams","Parker Yang"
];

document.getElementById("grid").innerHTML = users.map(n => `
<div class="video-tile">
    ${n.split(" ").map(x => x[0]).join("")}
    <div class="video-label">${n}</div>
</div>
`).join("");

// ================= INIT =================
startCamera();

// ================= SIDEBAR (UNCHANGED) =================
let isMeetingActive=false;

function startMeetingMode(){
    isMeetingActive=true;

    const sidebar=document.querySelector('.sidebar');
    const main=document.querySelector('.main-content');
    const btn=document.getElementById('meetingCollapseBtn');

    sidebar.classList.add('collapsed');
    main.classList.add('collapsed');

    btn.style.display='block';
}

document.getElementById('meetingCollapseBtn').onclick=()=>{
    if(!isMeetingActive) return;
    toggleSidebar();
};

document.getElementById('collapseLink').onclick=(e)=>{
    e.preventDefault();
    toggleSidebar();
};

function toggleSidebar(){
    const sidebar=document.querySelector('.sidebar');
    const main=document.querySelector('.main-content');
    const btn=document.getElementById('meetingCollapseBtn');
    const link=document.getElementById('collapseLink');

    sidebar.classList.toggle('collapsed');
    main.classList.toggle('collapsed');

    const collapsed=sidebar.classList.contains('collapsed');

    btn.innerHTML = collapsed
        ? '<i class="fas fa-chevron-right"></i>'
        : '<i class="fas fa-chevron-left"></i>';

    link.innerHTML = collapsed
        ? '<i class="fas fa-chevron-right"></i> Expand'
        : '<i class="fas fa-chevron-left"></i> Collapse';
}

startMeetingMode();
</script>

</body>
</html>
