<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentor Profile - SkillBridge</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header class="plp-nav">
        <a href="index.html" class="logo"><img src="asset/Black_Simple_SB_Latter_Logo-removebg-preview.png" alt="SkillBridge" class="logo-img"></a>
        <div class="links">
            <a href="index.html">Home</a>
            <a href="courses.html">Courses</a>
            <a href="jobs.html">Jobs</a>
            <a href="mentors.html">Mentors</a>
            <a href="study-groups.html">Study Groups</a>
            <a href="challenges.html">Challenges</a>
            <a href="marketplace.html">Marketplace</a>
        </div>
        <div class="buttons">
            <a href="register.html">Sign Up</a>
            <a href="dashboard.html">Dashboard</a>
        </div>
    </header>
    <div style="max-width:1000px;margin:2rem auto;padding:0 2rem">
        <div id="mentorProfile"
            style="background:#fff;border-radius:20px;padding:2rem;border:1px solid var(--gray-200)"></div>
    </div>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const mentorId = urlParams.get('id');
            const res = await API.getMentors();
            const mentor = res.data.find(m => m.id == mentorId);
            if (mentor) {
                document.getElementById('mentorProfile').innerHTML = `
                    <div style="display:flex;gap:2rem;align-items:center;margin-bottom:2rem">
                        <div style="width:120px;height:120px;border-radius:50%;background:var(--skyblue);display:flex;align-items:center;justify-content:center;font-size:3rem">${mentor.name.charAt(0)}</div>
                        <div><h1>${mentor.name}</h1><p style="color:var(--gray-600)">${mentor.role} at ${mentor.company}</p></div>
                    </div>
                    <p style="margin:2rem 0">${mentor.bio || 'Experienced professional passionate about mentoring.'}</p>
                    <h3>Expertise</h3>
                    <div style="display:flex;gap:0.5rem;margin:1rem 0">${mentor.expertise.map(s => `<span class="skill-tag">${s}</span>`).join('')}</div>
                    <button class="btn-primary" style="margin-top:2rem" onclick="UI.showToast('Booking request sent!','success')">Book Session</button>
                `;
            }
        });
    </script>
</body>

</html>
