<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Group - SkillBridge Academy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }

        .container {
            max-width: 500px;
            margin: 120px auto 0;
            padding: 2rem;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        /* sidebar/header from groups */
        .sidebar {
            width: 280px;
            background: linear-gradient(135deg, #00897B 0%, #008B82 100%);
            color: white;
            padding: 2rem 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-logo {
            padding: 0 1.5rem 2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .sidebar-logo img {
            height: 40px;
        }

        .sidebar-nav {
            list-style: none;
        }

        .sidebar-nav li {
            margin: 0.5rem 0;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1.5rem;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: all 0.3s;
            font-weight: 500;
        }

        .sidebar-nav a:hover {
            color: white;
            background: rgba(255, 255, 255, 0.1);
            padding-left: 2rem;
        }

        .sidebar-nav a.active {
            color: white;
            background: rgba(255, 255, 255, 0.2);
            border-left: 4px solid white;
            padding-left: 1.25rem;
        }

        .sidebar-nav i {
            width: 24px;
            text-align: center;
        }

        .main-content {
            margin-left: 280px;
        }

        .groups-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            background: white;
            padding: 1.5rem 2rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #222;
            padding: 0.5rem;
        }

        .mobile-menu-btn:hover {
            color: #00897B;
        }

        .groups-header h1 {
            font-size: 1.75rem;
            color: #222;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .language-selector {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: #f0f0f0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }

        .notification-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            color: #666;
            transition: all 0.3s;
        }

        .notification-icon:hover {
            background: #e0e0e0;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.5rem 1rem;
            background: #f0f0f0;
            border-radius: 8px;
            cursor: pointer;
        }

        .profile-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00897B 0%, #008B82 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .profile-name {
            font-weight: 600;
            color: #222;
        }

        @media(max-width:768px) {
            .sidebar {
                width: 280px;
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
                transition: transform 0.3s;
                z-index: 999;
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
            }

            .mobile-menu-btn {
                display: block;
            }

            .groups-header {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }

            .header-right {
                width: 100%;
                justify-content: space-between;
            }

            .language-selector {
                display: none;
            }

            .profile-name {
                display: none;
            }
        }

        h1 {
            margin-bottom: 1rem;
            font-size: 1.75rem;
            color: #222;
            text-align: center;
        }

        label {
            display: block;
            margin-top: 1rem;
            font-weight: 600;
            color: #333;
        }

        input[type=text],
        textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            margin-top: 0.5rem;
        }

        .btn {
            margin-top: 1.5rem;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-primary {
            background: #00897B;
            color: #fff;
        }

        .btn-primary:hover {
            background: #005f50;
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-logo"><a href="index.html"><img src="asset/Black_Simple_SB_Latter_Logo-removebg-preview.png" alt="SkillBridge"></a>
        </div>
        <nav class="sidebar-nav">
            <li><a href="dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a></li>
            <li><a href="explore-courses.html"><i class="fas fa-book"></i> Explore Courses</a></li>
            <li><a href="class-sessions.html"><i class="fas fa-calendar-check"></i> Class Sessions</a></li>
            <li><a href="groups.html"><i class="fas fa-users"></i> Groups</a></li>
            <li><a href="#"><i class="fas fa-file-check"></i> Submissions</a></li>
            <li><a href="community.html"><i class="fas fa-comments"></i> Community</a></li>
            <li><a href="#"><i class="fas fa-bolt"></i> Power AI</a></li>
            <li><a href="certificates.html"><i class="fas fa-certificate"></i> Certificates</a></li>
        </nav>
    </aside>
    <div class="main-content">
        <div class="groups-header">
            <div class="header-left">
                <button class="mobile-menu-btn" id="sidebarToggle" onclick="toggleSidebar()"><i
                        class="fas fa-bars"></i></button>
                <h1 id="formTitle">Join Group</h1>
            </div>
            <div class="header-right">
                <div class="language-selector"><img
                        src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect fill='%23012169' width='32' height='32'/%3E%3Cpath fill='%23FFF' d='M0 0h32v32H0z'/%3E%3C/svg%3E"
                        alt="EN" style="width:20px;height:13px;border-radius:2px;">English<i
                        class="fas fa-chevron-down"></i></div>
                <div class="notification-icon"><i class="fas fa-bell"></i></div>
                <div class="profile-section">
                    <div class="profile-avatar">M</div><span class="profile-name">Mugisha</span><i
                        class="fas fa-chevron-down"></i>
                </div>
            </div>
        </div>
        <div class="container">
            <p id="groupName" style="text-align:center;font-weight:500;color:#555;"></p>
            <label for="nameInput">Your name</label>
            <input type="text" id="nameInput" placeholder="Enter your name">
            <label for="skillsInput">Skills / Comment</label>
            <textarea id="skillsInput" rows="4" placeholder="Describe what you bring to the group"></textarea>
            <button class="btn btn-primary" id="submitBtn">Submit</button>
        </div>
    </div>
    <script>
        function getParam(name) {
            const url = new URL(window.location.href);
            return url.searchParams.get(name);
        }
        function toggleSidebar() { document.querySelector('.sidebar').classList.toggle('active'); }
        const groups = [
            { name: 'JavaScript Fundamentals Study Group', desc: 'Master JavaScript from scratch with hands-on projects and peer support.', members: 12 },
            { name: 'HTML & CSS Masterclass Group', desc: 'Build beautiful responsive websites with modern HTML5 & CSS3 together.', members: 14 },
            { name: 'React - Complete Guide Squad', desc: 'Build powerful React applications with hooks and Redux in this group.', members: 8 },
            { name: 'Python for Data Science Group', desc: 'Learn Python for analysis, visualization, and machine learning projects.', members: 15 },
            { name: 'SQL for Data Science Crew', desc: 'Master SQL queries, joins, and optimizations with real-world datasets.', members: 10 },
            { name: 'UI/UX Design Fundamentals Group', desc: 'Master Figma, wireframing, and prototyping with design peers.', members: 9 }
        ];
        let groupIndex = parseInt(getParam('group'));
        let nextAction = getParam('next');
        if (isNaN(groupIndex) || groupIndex < 0 || groupIndex >= groups.length) groupIndex = 0;
        document.getElementById('groupName').textContent = groups[groupIndex].name;
        const user = JSON.parse(localStorage.getItem('skillbridge_user') || 'null');
        if (user && user.name) {
            document.querySelector('.profile-avatar').textContent = user.name.charAt(0).toUpperCase();
            document.querySelector('.profile-name').textContent = user.name;
        }
        document.getElementById('submitBtn').addEventListener('click', function () {
            const name = document.getElementById('nameInput').value.trim();
            const skills = document.getElementById('skillsInput').value.trim();
            if (!name) { alert('Please enter your name'); return; }
            localStorage.setItem('skillbridge_user', JSON.stringify({ name }));
            // mark this group joined
            const joined = JSON.parse(localStorage.getItem('joinedGroups') || '{}');
            joined[groups[groupIndex].name] = true;
            localStorage.setItem('joinedGroups', JSON.stringify(joined));
            alert('You joined ' + groups[groupIndex].name + (skills ? (' with: ' + skills) : ''));
            if (nextAction === 'meeting') {
                // prepare meeting members sample (6 participants)
                const members = [
                    { name: 'Nina Duffy', img: 'asset/modules/maxresdefault.jpg', active: true },
                    { name: 'Owen Johnson', img: 'asset/modules/react-with-bootstrap.png', muted: true },
                    { name: 'Tarek Ayad', img: 'asset/modules/maxresdefault (1).jpg' },
                    { name: 'Mia Smith', img: 'asset/modules/maxresdefault.jpg' },
                    { name: 'Lauren Williams', img: 'asset/modules/react-with-bootstrap.png', muted: true },
                    { name: 'Parker Yang', img: 'asset/modules/maxresdefault (1).jpg' }
                ];
                localStorage.setItem('meetingMembers', JSON.stringify(members));
                localStorage.setItem('meetingGroup', groups[groupIndex].name);
                window.location.href = 'meeting.html';
            } else {
                window.location.href = 'groups.html';
            }
        });
    </script>
</body>

</html>
